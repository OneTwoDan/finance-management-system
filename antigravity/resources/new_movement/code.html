<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nuevo Movimiento - Finanzas App</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<div class="flex h-screen overflow-hidden">
<!-- Sidebar -->
<aside class="w-64 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 flex flex-col">
<div class="p-6">
<div class="flex items-center gap-3">
<div class="size-10 rounded-full bg-primary flex items-center justify-center text-white">
<span class="material-symbols-outlined">payments</span>
</div>
<div>
<h1 class="text-base font-bold leading-tight">Finanzas App</h1>
<p class="text-xs text-slate-500 dark:text-slate-400">Gestión Financiera</p>
</div>
</div>
</div>
<nav class="flex-1 px-4 space-y-1">
<a class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-900 transition-colors" href="#">
<span class="material-symbols-outlined text-[22px]">house</span>
                    Inicio
                </a>
<a class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-lg bg-primary/10 text-primary" href="#">
<span class="material-symbols-outlined text-[22px]">swap_horiz</span>
                    Movimientos
                </a>
<a class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-900 transition-colors" href="#">
<span class="material-symbols-outlined text-[22px]">group</span>
                    Usuarios
                </a>
<a class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-900 transition-colors" href="#">
<span class="material-symbols-outlined text-[22px]">pie_chart</span>
                    Reportes
                </a>
</nav>
<div class="p-4 border-t border-slate-200 dark:border-slate-800">
<div class="flex items-center gap-3 px-2">
<div class="size-8 rounded-full bg-slate-200 dark:bg-slate-800 overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Avatar de usuario profesional" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCtNUlzcM_yyV6-hmSzCsD9-3_8INBgNn8sAamjXrHlwI55nus8GL9hMM6za44gFdxPsA77LY1As7QXwfvRqZdJ0KZoMjFK6VJ-aYb2zkvDbrDDBxcr8a5GiXH4pxYl0_wJNWBNWPuQ5qJ_jCh0vrUX6IoDCL9v55vovlpukkpqWMg7W5PjMwkttocZbKyAKidjvULEQFqqd0sGBMbSxtEKXfQTZbXxMwp_nzTmv6d-OeZCGplcogmWiNmf67AiW5JY2ZZXq26jYWbV"/>
</div>
<div class="flex-1 min-w-0">
<p class="text-sm font-medium truncate">Alex Morgan</p>
<p class="text-xs text-slate-500 truncate">Admin</p>
</div>
</div>
</div>
</aside>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col relative">
<!-- Header -->
<header class="h-16 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md flex items-center justify-between px-8">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
<h2 class="text-sm font-medium">Movimientos / Nuevo</h2>
</div>
<div class="flex items-center gap-4">
<button class="p-2 text-slate-500 hover:text-slate-900 dark:hover:text-slate-100 transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="p-2 text-slate-500 hover:text-slate-900 dark:hover:text-slate-100 transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<!-- Content Area / Dashboard background -->
<div class="flex-1 p-8 overflow-y-auto bg-background-light dark:bg-background-dark">
<div class="max-w-5xl mx-auto opacity-40 pointer-events-none">
<div class="grid grid-cols-3 gap-6 mb-8">
<div class="h-32 bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800"></div>
<div class="h-32 bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800"></div>
<div class="h-32 bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800"></div>
</div>
<div class="h-96 bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800"></div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
<div class="bg-white dark:bg-slate-950 w-full max-w-lg rounded-xl shadow-2xl border border-slate-200 dark:border-slate-800 overflow-hidden">
<div class="px-6 py-4 border-b border-slate-100 dark:border-slate-900 flex items-center justify-between">
<h3 class="text-lg font-bold">Nuevo Movimiento de Dinero</h3>
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="p-8 space-y-6">
<div class="space-y-4">
<!-- Concepto Field -->
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="concepto">Concepto</label>
<div class="relative">
<input class="w-full h-12 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg px-4 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400" id="concepto" placeholder="Ej. Pago de servicios mensual" type="text"/>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Monto Field -->
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="monto">Monto</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="text-slate-400 group-focus-within:text-primary transition-colors">$</span>
</div>
<input class="w-full h-12 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg pl-8 pr-4 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400 font-medium" id="monto" placeholder="0.00" type="number"/>
</div>
</div>
<!-- Fecha Field -->
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="fecha">Fecha</label>
<div class="relative group">
<div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-xl group-focus-within:text-primary transition-colors">calendar_today</span>
</div>
<input class="w-full h-12 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg px-4 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all appearance-none" id="fecha" type="date" value="2023-10-27"/>
</div>
</div>
</div>
<!-- Optional Transaction Type (Visual helper) -->
<div class="space-y-2 pt-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Tipo de movimiento</label>
<div class="grid grid-cols-2 gap-2">
<button class="flex items-center justify-center gap-2 h-10 rounded-lg border-2 border-primary bg-primary/5 text-primary text-xs font-bold transition-all">
<span class="material-symbols-outlined text-base">arrow_upward</span>
                                        INGRESO
                                    </button>
<button class="flex items-center justify-center gap-2 h-10 rounded-lg border-2 border-transparent bg-slate-100 dark:bg-slate-900 text-slate-500 text-xs font-bold hover:bg-slate-200 transition-all">
<span class="material-symbols-outlined text-base">arrow_downward</span>
                                        EGRESO
                                    </button>
</div>
</div>
</div>
<div class="flex flex-col gap-3 pt-4">
<button class="w-full h-12 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl">add_circle</span>
                                Ingresar Movimiento
                            </button>
<button class="w-full h-10 text-slate-500 hover:text-slate-800 dark:hover:text-slate-200 text-sm font-medium transition-colors">
                                Cancelar
                            </button>
</div>
</div>
<div class="px-8 py-4 bg-slate-50 dark:bg-slate-900/50 border-t border-slate-100 dark:border-slate-900 text-center">
<p class="text-[11px] text-slate-400 uppercase tracking-widest font-semibold">Se guardará en la cuenta principal de ahorros</p>
</div>
</div>
</div>
</main>
</div>
</body></html>
